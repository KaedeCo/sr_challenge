<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="30%" stop-color="#7dd3fc"/>
      <stop offset="60%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="gemDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <!-- outer glow -->
  <polygon points="32,4 38,28 56,32 38,36 32,60 26,36 8,32 26,28"
    fill="#7dd3fc" opacity="0.2" filter="url(#glow)"/>
  <!-- main gem body -->
  <polygon points="32,8 37,28 52,32 37,36 32,56 27,36 12,32 27,28"
    fill="url(#gem)" stroke="#38bdf8" stroke-width="0.5"/>
  <!-- inner highlight -->
  <polygon points="32,16 35,30 46,32 35,34 32,48 29,34 18,32 29,30"
    fill="url(#gemDark)" opacity="0.6"/>
  <!-- center sparkle -->
  <polygon points="32,22 34,30 42,32 34,34 32,42 30,34 22,32 30,30"
    fill="#e0f2fe" opacity="0.8"/>
  <!-- corner dots -->
  <circle cx="32" cy="8" r="1.5" fill="#e0f2fe"/>
  <circle cx="52" cy="32" r="1.5" fill="#e0f2fe"/>
  <circle cx="32" cy="56" r="1.5" fill="#e0f2fe"/>
  <circle cx="12" cy="32" r="1.5" fill="#e0f2fe"/>
</svg>
